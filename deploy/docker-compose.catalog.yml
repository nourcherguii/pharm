# Machine Camarade B : Service Catalogue (Produits)
# Lancer avec: docker compose -f docker-compose.catalog.yml up -d --build

services:
  postgres-catalog:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_db
    volumes:
      - pg_catalog:/var/lib/postgresql/data
    networks:
      - pharm_net

  catalog-api:
    build:
      context: ..
      dockerfile: services/catalog-api/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://catalog:catalog@postgres-catalog:5432/catalog_db
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY_CATALOG:-change-me-catalog}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-shared-jwt-secret-change-in-prod}
      AMQP_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@${MASTER_IP:-localhost}:5672/
      CONSUL_HTTP_ADDR: http://${MASTER_IP:-localhost}:8500
      SERVICE_NAME: catalog-api
      SERVICE_PORT: "8000"
    ports:
      - "8001:8000" # Accessible sur le port 8001 pour éviter les conflits
    depends_on:
      - postgres-catalog
    volumes:
      - ../services/catalog-api:/app
    networks:
      - pharm_net

networks:
  pharm_net:
    driver: bridge

volumes:
  pg_catalog:
