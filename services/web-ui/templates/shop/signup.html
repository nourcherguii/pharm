{% extends "base.html" %}

{% block title %}Créer un compte{% endblock %}

{% block extra_css %}
<style>
  .auth-hero {
    background: linear-gradient(135deg, var(--green-light) 0%, #fff 100%);
    border-radius: 28px;
    padding: 3rem 1rem;
    margin: 2rem auto;
    max-width: 600px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  }
  .auth-panel {
    background: white;
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 20px 35px -12px rgba(46,125,50,0.2);
    border: 1px solid var(--border);
  }
  .auth-panel h1 {
    font-size: 1.8rem;
    margin: 0 0 0.5rem;
    text-align: center;
  }
  .auth-panel .sub {
    text-align: center;
    margin-bottom: 2rem;
    color: var(--muted);
  }
  .form-group {
    margin-bottom: 1.2rem;
  }
  .form-group label {
    display: block;
    margin-bottom: 0.4rem;
    font-weight: 500;
  }
  .form-input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    transition: 0.2s;
  }
  .form-input:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-hero">
  <div class="auth-panel">
    <h1>Créer un compte pro</h1>
    <div class="sub">Rejoignez MarketPharm en quelques secondes</div>
    
    <form method="post" class="stack">
      {% csrf_token %}
      
      <div class="form-group">
        <label>Nom de l'établissement / Nom complet</label>
        <input type="text" name="full_name" class="form-input" required placeholder="Pharmacie Centrale">
      </div>
      
      <div class="form-group">
        <label>E-mail professionnel</label>
        <input type="email" name="email" class="form-input" required autocomplete="email" placeholder="contact@pharmacie.dz">
      </div>
      
      <div class="form-group" style="margin-bottom: 2rem;">
          <label for="wilaya" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">
              Votre Wilaya (Localisation) ⭐
          </label>
          <select name="wilaya" id="wilaya" class="form-input" required>
              <option value="" disabled selected>Choisissez votre Wilaya</option>
              <option value="Adrar">01 - Adrar</option>
              <option value="Chlef">02 - Chlef</option>
              <option value="Laghouat">03 - Laghouat</option>
              <option value="Oum El Bouaghi">04 - Oum El Bouaghi</option>
              <option value="Batna">05 - Batna</option>
              <option value="Bejaia">06 - Bejaia</option>
              <option value="Biskra">07 - Biskra</option>
              <option value="Bechar">08 - Bechar</option>
              <option value="Blida">09 - Blida</option>
              <option value="Bouira">10 - Bouira</option>
              <option value="Tamanrasset">11 - Tamanrasset</option>
              <option value="Tebessa">12 - Tebessa</option>
              <option value="Tlemcen">13 - Tlemcen</option>
              <option value="Tiaret">14 - Tiaret</option>
              <option value="Tizi Ouzou">15 - Tizi Ouzou</option>
              <option value="Alger">16 - Alger</option>
              <option value="Djelfa">17 - Djelfa</option>
              <option value="Jijel">18 - Jijel</option>
              <option value="Setif">19 - Setif</option>
              <option value="Saida">20 - Saida</option>
              <option value="Skikda">21 - Skikda</option>
              <option value="Sidi Bel Abbes">22 - Sidi Bel Abbes</option>
              <option value="Annaba">23 - Annaba</option>
              <option value="Guelma">24 - Guelma</option>
              <option value="Constantine">25 - Constantine</option>
              <option value="Medea">26 - Medea</option>
              <option value="Mostaganem">27 - Mostaganem</option>
              <option value="M'Sila">28 - M'Sila</option>
              <option value="Mascara">29 - Mascara</option>
              <option value="Ouargla">30 - Ouargla</option>
              <option value="Oran">31 - Oran</option>
              <option value="El Bayadh">32 - El Bayadh</option>
              <option value="Illizi">33 - Illizi</option>
              <option value="Bordj Bou Arreridj">34 - Bordj Bou Arreridj</option>
              <option value="Boumerdes">35 - Boumerdes</option>
              <option value="El Tarf">36 - El Tarf</option>
              <option value="Tindouf">37 - Tindouf</option>
              <option value="Tissemsilt">38 - Tissemsilt</option>
              <option value="El Oued">39 - El Oued</option>
              <option value="Khenchela">40 - Khenchela</option>
              <option value="Souk Ahras">41 - Souk Ahras</option>
              <option value="Tipaza">42 - Tipaza</option>
              <option value="Mila">43 - Mila</option>
              <option value="Ain Defla">44 - Ain Defla</option>
              <option value="Naama">45 - Naama</option>
              <option value="Ain Temouchent">46 - Ain Temouchent</option>
              <option value="Ghardaia">47 - Ghardaia</option>
              <option value="Relizane">48 - Relizane</option>
              <option value="Timimoun">49 - Timimoun</option>
              <option value="Bordj Badji Mokhtar">50 - Bordj Badji Mokhtar</option>
              <option value="Ouled Djellal">51 - Ouled Djellal</option>
              <option value="Beni Abbes">52 - Beni Abbes</option>
              <option value="In Salah">53 - In Salah</option>
              <option value="In Guezzam">54 - In Guezzam</option>
              <option value="Touggourt">55 - Touggourt</option>
              <option value="Djanet">56 - Djanet</option>
              <option value="El M'ghair">57 - El M'ghair</option>
              <option value="El Menia">58 - El Menia</option>
          </select>
      </div>

      <div class="form-group" style="margin-bottom: 2rem;">
          <label for="role" style="display: block; margin-bottom: 0.8rem; font-weight: 500;">
              Type de compte :
          </label>
          <select name="role" id="role" class="form-input" onchange="togglePharmacyFields()">
              <option value="PRO">Client Professionnel (Acheteur)</option>
              <option value="PHARMACY">Pharmacie / Vendeur (Exposer ses produits)</option>
          </select>
      </div>

      <!-- Champs spécifiques Pharmacie -->
      <div id="pharmacy-fields" style="display: none; animation: fadeIn 0.4s ease;">
          <div class="form-group">
              <label for="pharmacy_name">Nom de la Pharmacie ⭐</label>
              <input type="text" name="pharmacy_name" id="pharmacy_name" class="form-input" placeholder="Ex: Pharmacie Centrale">
          </div>
      </div>

      <style>
          @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
      </style>

      <script>
          function togglePharmacyFields() {
              const role = document.getElementById('role').value;
              const fields = document.getElementById('pharmacy-fields');
              const pName = document.getElementById('pharmacy_name');
              
              if (role === 'PHARMACY') {
                  fields.style.display = 'block';
                  pName.required = true;
              } else {
                  fields.style.display = 'none';
                  pName.required = false;
              }
          }
      </script>
      
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" class="form-input" required placeholder="••••••••">
      </div>
      
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="password2" class="form-input" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1.1rem; padding: 0.8rem;"><i class="fas fa-user-plus"></i> Créer mon compte</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
      <span class="muted">Vous avez déjà un compte ?</span>
      <a href="{% url 'login' %}" style="font-weight: 600; color: var(--green);">Connectez-vous</a>
    </div>
  </div>
</div>
{% endblock %}
