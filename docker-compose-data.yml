# Machine 2 (Backend Services) - 172.20.10.2
services:
  consul:
    image: hashicorp/consul:1.17
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"
    networks:
      - pharm

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    networks:
      - pharm

  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth_db
    volumes:
      - pg_auth:/var/lib/postgresql/data
    networks:
      - pharm

  postgres-catalog:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_db
    volumes:
      - pg_catalog:/var/lib/postgresql/data
    networks:
      - pharm

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8001:8000"   # Reachable from Machine 1 on 8001
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://auth:auth@postgres-auth:5432/auth_db
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-auth}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-shared-jwt-secret-change-in-prod}
      CONSUL_HTTP_ADDR: http://consul:8500
      SERVICE_NAME: auth-service
      SERVICE_PORT: "8000"
    volumes:
      - ./services/auth-service:/app
    networks:
      - pharm

  catalog-api:
    build:
      context: .
      dockerfile: services/catalog-api/Dockerfile
    ports:
      - "8000:8000"   # Reachable from Machine 1 on 8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://catalog:catalog@postgres-catalog:5432/catalog_db
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY_CATALOG:-change-me-catalog}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-shared-jwt-secret-change-in-prod}
      AMQP_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      EGP_TO_DZD_RATE: ${EGP_TO_DZD_RATE:-2.70}
      CONSUL_HTTP_ADDR: http://consul:8500
      SERVICE_NAME: catalog-api
      SERVICE_PORT: "8000"
    volumes:
      - ./services/catalog-api:/app
    networks:
      - pharm

  notification-worker:
    build:
      context: .
      dockerfile: services/notification-worker/Dockerfile
    environment:
      AMQP_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - ./services/notification-worker:/app
    networks:
      - pharm

networks:
  pharm:
    driver: bridge

volumes:
  pg_auth:
  pg_catalog:
